            PrayerEngine.init();
            QuranEngine.init();
            TasksEngine.init();
            AdhkarEngine.init();
            RadioEngine.init();
            HadithEngine.init(); 
            QuizEngine.init(); 
            MotivationEngine.init(); 
            
            const savedOrder = localStorage.getItem('islamOS_appOrder');
            if (savedOrder) {
                this.state.appOrder = JSON.parse(savedOrder);
                Object.keys(this.apps).forEach(id => {
                    if(!this.state.appOrder.includes(id)) this.state.appOrder.push(id);
                });
            } else {
                this.state.appOrder = Object.keys(this.apps);
            }

            document.addEventListener('click', (e) => {
                if(this.state.isStartMenuOpen && !e.target.closest('#start-menu') && !e.target.closest('.sys-logo')) {
                    this.toggleStartMenu();
                }
                if(this.state.isWidgetPanelOpen && !e.target.closest('#widget-panel') && !e.target.closest('.menubar-right')) {
                    this.toggleWidgetPanel();
                }
            });

            document.getElementById('lockscreen').addEventListener('click', () => {
                if(this.state.isLocked) this.unlock();
            });
            document.getElementById('lockscreen').addEventListener('touchstart', () => {
                if(this.state.isLocked) this.unlock();
            });
        },

        unlock() {
            this.state.isLocked = false;
            document.getElementById('lockscreen').classList.add('unlocked');
            document.getElementById('desktop-environment').classList.add('active');
            
            setTimeout(() => {
                this.renderDesktop();
                this.restoreSession();
                if(this.state.userProfile.name === "Guest") {
                    setTimeout(() => this.openApp('settings'), 500);
                }
            }, 500);
        },

        lockOS() {
            this.state.isLocked = true;
            document.getElementById('lockscreen').classList.remove('unlocked');
            document.getElementById('desktop-environment').classList.remove('active');
        },

        saveNote(val) {
            localStorage.setItem('islamOS_notes', val);
            const status = document.getElementById('note-save-status');
            if(status) {
                status.style.opacity = '1';
                clearTimeout(this.noteTimer);
                this.noteTimer = setTimeout(() => status.style.opacity = '0', 1000);
            }
        },

        saveSession() {
            const openApps = Object.keys(this.state.activeWindows);
            localStorage.setItem('islamOS_session', JSON.stringify(openApps));
        },

        restoreSession() {
            const savedSession = localStorage.getItem('islamOS_session');
            if (savedSession) {
                const appsToOpen = JSON.parse(savedSession);
                appsToOpen.forEach(appId => {
                    setTimeout(() => this.openApp(appId, true), Math.random() * 400);
                });
            }
        },

        clearSystemData() {
            if(confirm("Are you sure you want to erase all data and reset Islam OS?")) {
                localStorage.clear();
                location.reload();
            }
        },

        loadProfile() {
            const saved = localStorage.getItem('islamOS_profile');
            if (saved) {
                const parsed = JSON.parse(saved);
                this.state.userProfile = { ...this.state.userProfile, ...parsed };
            }
            document.getElementById('sm-user-name').innerText = this.state.userProfile.name;
        },

        setupPWA() {
            const manifest = {
                name: "Islam OS 3.0",
                short_name: "IslamOS",
                description: "A comprehensive Islamic operating system environment.",
                start_url: location.href,
                display: "standalone",
                background_color: "#0f172a",
                theme_color: "#10b981",
                icons: [
                    {
                        src: "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2310b981'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E%E2%98%AA%3C/text%3E%3C/svg%3E",
                        sizes: "192x192",
                        type: "image/svg+xml",
                        purpose: "any maskable"
                    },
                    {
                        src: "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2310b981'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E%E2%98%AA%3C/text%3E%3C/svg%3E",
                        sizes: "512x512",
                        type: "image/svg+xml",
                        purpose: "any maskable"
                    }
                ]
            };
            const manifestUrl = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
            document.head.appendChild(Object.assign(document.createElement('link'), { rel: 'manifest', href: manifestUrl }));

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                this.deferredPrompt = e;
                const installCard = document.getElementById('system-install-card');
                if(installCard) installCard.style.display = 'block';
            });
        },

        installPWA() {
            if(this.deferredPrompt) {
                this.deferredPrompt.prompt();
                this.deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        OS.showNotification("Installation Started", "Islam OS is being added to your device.", "ph-download-simple");
                    }
                    this.deferredPrompt = null;
                    const installCard = document.getElementById('system-install-card');
                    if(installCard) installCard.style.display = 'none';
                });
            } else {
                OS.showNotification("Notice", "Your device requires you to manually 'Add to Home Screen' via the browser share menu.", "ph-info");
            }
        },

        requestNotificationPermission(checkbox) {
            if (checkbox.checked) {
                if (Notification.permission !== "granted") {
                    Notification.requestPermission().then(permission => {
                        if (permission === "granted") {
                            this.state.userProfile.notifications = true;
                            this.saveProfile();
                            this.showNotification("Notifications Enabled", "You will now receive Adhan alerts.", "ph-bell-ringing");
                        } else {
                            checkbox.checked = false;
                        }
                    });
                } else {
                    this.state.userProfile.notifications = true;
                    this.saveProfile();
                }
            } else {
                this.state.userProfile.notifications = false;
                this.saveProfile();
            }
        },

        showNotification(title, message, icon = 'ph-info') {
            const container = document.getElementById('os-toasts');
            if(!container) return;

            const toast = document.createElement('div');
            toast.className = 'glass p-4 rounded-2xl flex items-start gap-4 w-[320px] shadow-[0_10px_40px_rgba(0,0,0,0.6)] border-l-4 border-l-emerald-500 bg-[rgba(20,25,30,0.9)] transform translate-x-full transition-transform duration-500 ease-out';
            toast.innerHTML = `
                <i class="ph-fill ${icon} text-3xl text-emerald-400 mt-1"></i>
                <div class="flex-1">
                    <h4 class="text-base font-bold text-white leading-tight">${title}</h4>
                    <p class="text-sm text-gray-300 mt-1 leading-snug font-medium">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            void toast.offsetWidth;
            toast.style.transform = 'translateX(0)';

            if(this.state.userProfile.notifications && Notification.permission === "granted") {
                try { new Notification(title, { body: message }); } catch(e) {}
            }

            setTimeout(() => {
                toast.style.transform = 'translateX(120%)';
                setTimeout(() => toast.remove(), 500);
            }, 6000);
        },

        saveProfile() {
            const nameInput = document.getElementById('profile-name-input');
            if(nameInput) this.state.userProfile.name = nameInput.value;
            
            const fields = ['theme', 'fontStyle', 'fontSize', 'arabicFont', 'blur', 'prayerMethod'];
            fields.forEach(f => {
                const el = document.getElementById(`profile-${f}-input`);
                if(el) this.state.userProfile[f] = el.value;
            });

            localStorage.setItem('islamOS_profile', JSON.stringify(this.state.userProfile));
            document.getElementById('sm-user-name').innerText = this.state.userProfile.name;
            
            if(nameInput) {
                document.getElementById('profile-name-display').innerText = nameInput.value;
                const btn = nameInput.nextElementSibling;
                btn.innerText = "Saved"; btn.classList.add('bg-emerald-500', 'text-white'); btn.classList.remove('bg-white', 'text-black');
                setTimeout(() => { btn.innerText = "Save"; btn.classList.add('bg-white', 'text-black'); btn.classList.remove('bg-emerald-500', 'text-white'); }, 2000);
            }
            this.applyPreferences();
        },

        applyPreferences() {
            const p = this.state.userProfile;
            const root = document.documentElement;
            
            if(p.theme === 'mecca') {
                BackgroundEngine.setStatic("url('https://images.unsplash.com/photo-1565552643983-c65ee11f0cb4?q=80&w=2500&auto=format&fit=crop')");
                root.style.setProperty('--accent-color', '#f59e0b'); 
            } else if(p.theme === 'quran') {
                BackgroundEngine.setStatic("url('https://images.unsplash.com/photo-1601289139585-780c10c14b22?q=80&w=2500&auto=format&fit=crop')");
                root.style.setProperty('--accent-color', '#10b981'); 
            } else { 
                BackgroundEngine.start();
                root.style.setProperty('--accent-color', '#10b981'); 
            }

            if(p.fontSize === 'small') {
                root.style.fontSize = '14px'; document.body.style.fontSize = '14px';
            } else if(p.fontSize === 'large') {
                root.style.fontSize = '18px'; document.body.style.fontSize = '18px';
            } else {
                root.style.fontSize = '16px'; document.body.style.fontSize = '16px';
            }

            if(p.arabicFont === 'amiri') {
                root.style.setProperty('--arabic-font', "'Amiri', serif");
            } else if(p.arabicFont === 'noto') {
                root.style.setProperty('--arabic-font', "'Noto Naskh Arabic', serif");
            } else if(p.arabicFont === 'ruqaa') {
                root.style.setProperty('--arabic-font', "'Aref Ruqaa', serif");
            }

            root.style.setProperty('--glass-blur', (p.blur !== undefined ? p.blur : 25) + 'px');
        },

        startClock(isInstant = false) {
            const updateTime = () => {
                const now = new Date();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                minutes = minutes < 10 ? '0' + minutes : minutes;
                
                const timeStr = `${hours}:${minutes} ${ampm}`;
                const sysTime = document.getElementById('sys-time');
                if (sysTime) sysTime.innerText = timeStr;
                
                const lHours = now.getHours() % 12 || 12;
                const minStr = minutes.toString().padStart(2, '0');
                
                const lockTime = document.getElementById('lock-time');
                if (lockTime) lockTime.innerText = `${lHours}:${minStr}`;
                
                const deskTime = document.getElementById('desk-wid-time');
                if (deskTime) deskTime.innerText = `${lHours}:${minStr}`;
                
                const mobTime = document.getElementById('mob-wid-time');
                if (mobTime) mobTime.innerText = `${lHours}:${minStr}`;

                const hijriOptions = { day: 'numeric', month: 'long', year: 'numeric', calendar: 'islamic-umalqura' };
                const hDate = new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura', hijriOptions).format(now);
                
                const sysHijri = document.getElementById('sys-hijri');
                if (sysHijri) sysHijri.innerText = hDate;
                
                const lockDate = document.getElementById('lock-date');
                if (lockDate) lockDate.innerText = `${now.toLocaleDateString('en-US', {weekday: 'long'})}, ${hDate}`;
                
                const deskDate = document.getElementById('desk-wid-date');
                if (deskDate) deskDate.innerText = now.toLocaleDateString('en-US', {weekday: 'long', month: 'long', day: 'numeric'});
                
                const deskHijri = document.getElementById('desk-wid-hijri');
                if (deskHijri) deskHijri.innerText = hDate;

                const mobDay = document.getElementById('mob-wid-day');
                if (mobDay) mobDay.innerText = now.toLocaleDateString('en-US', {weekday: 'short'});
                
                const mobDateNum = document.getElementById('mob-wid-date-num');
                if (mobDateNum) mobDateNum.innerText = now.getDate();

                const mobHijri = document.getElementById('mob-wid-hijri');
                if (mobHijri) mobHijri.innerText = hDate;
            };
            
            if (isInstant) updateTime();
            else { updateTime(); setInterval(updateTime, 1000); }
        },

        renderDesktop() {
            const desktopArea = document.getElementById('desktop-area');
            desktopArea.innerHTML = '';

            const mobileWidgets = document.createElement('div');
            mobileWidgets.className = 'contents md:hidden';
            mobileWidgets.innerHTML = `
                <div class="ios-widget widget-2x2 cursor-pointer group bg-gradient-to-br from-white/10 to-white/5" onclick="OS.openApp('calendar')">
                    <div class="text-sm font-bold text-red-400 uppercase tracking-widest mb-1" id="mob-wid-day">DAY</div>
                    <div class="text-5xl font-bold text-white mb-2" id="mob-wid-date-num">00</div>
                    <div class="text-xs font-medium text-emerald-400 mt-auto leading-tight" id="mob-wid-hijri">Loading...</div>
                </div>
                
                <div class="ios-widget widget-2x2 cursor-pointer group flex items-center justify-center relative overflow-hidden" onclick="OS.openApp('settings')">
                    <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/20 to-teal-900/40"></div>
                    <div class="absolute -right-4 -bottom-4 text-emerald-500/30"><i class="ph-fill ph-clock text-7xl"></i></div>
                    <div class="text-4xl font-bold text-white tracking-tighter z-10" id="mob-wid-time">00:00</div>
                </div>

                <div class="ios-widget widget-4x2 cursor-pointer group overflow-hidden bg-gradient-to-r from-black/40 to-black/10" onclick="OS.openApp('prayer')">
                    <div class="absolute -right-4 -top-8 text-emerald-500/20 transition transform group-hover:scale-110 duration-500"><i class="ph-fill ph-mosque text-[120px]"></i></div>
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-1 z-10"><i class="ph-fill ph-clock text-emerald-400"></i> Next Prayer</h4>
                    <div class="flex-1 flex flex-col justify-end z-10 relative pb-1">
                        <div class="flex items-end gap-3">
                            <div class="text-3xl font-bold text-emerald-400 tracking-tight" id="mob-wid-prayer-name">--</div>
                            <div class="text-lg font-medium text-white mb-0.5" id="mob-wid-prayer-time">--:--</div>
                        </div>
                        <div class="mt-2 text-sm font-mono font-bold text-white" id="mob-wid-prayer-countdown">00:00:00</div>
                    </div>
                </div>
            `;
            desktopArea.appendChild(mobileWidgets);

            this.state.appOrder.forEach(appId => {
                if(!this.apps[appId]) return;
                const app = this.apps[appId];
                const iconDiv = document.createElement('div');
                iconDiv.className = 'desktop-icon';
                iconDiv.dataset.appId = appId;
                iconDiv.draggable = true;
                iconDiv.innerHTML = `<i class="ph-fill ${app.icon}"></i><span>${app.title}</span>`;
                
                iconDiv.onclick = (e) => {
                    if(iconDiv.dataset.isDragging === 'true') return;
                    this.openApp(app.id);
                };
                
                desktopArea.appendChild(iconDiv);
            });
            
            this.initDesktopDragDrop();
            this.updateDock();
            
            this.startClock(true);
            if(typeof PrayerEngine !== 'undefined' && PrayerEngine.timer) PrayerEngine.calculateNext();
        },

        initDesktopDragDrop() {
            const desktopArea = document.getElementById('desktop-area');
            const icons = desktopArea.querySelectorAll('.desktop-icon');
            let draggedEl = null;

            icons.forEach(icon => {
                icon.addEventListener('dragstart', (e) => {
                    draggedEl = icon;
                    setTimeout(() => icon.style.opacity = '0.5', 0);
                });
                icon.addEventListener('dragend', () => {
                    if(draggedEl) draggedEl.style.opacity = '1';
                    draggedEl = null;
                    OS.saveAppOrder();
                });
                icon.addEventListener('dragover', (e) => e.preventDefault());
                icon.addEventListener('dragenter', (e) => {
                    e.preventDefault();
                    if(draggedEl && draggedEl !== icon && icon.classList.contains('desktop-icon')) {
                        const allIcons = [...desktopArea.querySelectorAll('.desktop-icon')];
                        const draggedIdx = allIcons.indexOf(draggedEl);
                        const targetIdx = allIcons.indexOf(icon);
                        if (draggedIdx < targetIdx) icon.after(draggedEl);
                        else icon.before(draggedEl);
                    }
                });
            });

            let touchTimer;
            let touchGhost = null;

            icons.forEach(icon => {
                icon.addEventListener('touchstart', (e) => {
                    icon.dataset.isDragging = 'false';
                    touchTimer = setTimeout(() => {
                        icon.dataset.isDragging = 'true';
                        draggedEl = icon;
                        if(navigator.vibrate) navigator.vibrate(50);
                        
                        const touch = e.touches[0];
                        const rect = icon.getBoundingClientRect();
                        
                        touchGhost = icon.cloneNode(true);
                        touchGhost.style.position = 'fixed';
                        touchGhost.style.margin = '0';
                        touchGhost.style.left = (touch.clientX - rect.width / 2) + 'px';
                        touchGhost.style.top = (touch.clientY - rect.height / 2) + 'px';
                        touchGhost.style.width = rect.width + 'px';
                        touchGhost.style.height = rect.height + 'px';
                        touchGhost.style.opacity = '0.8';
                        touchGhost.style.pointerEvents = 'none';
                        touchGhost.style.zIndex = '100000';
                        touchGhost.style.transform = 'scale(1.15)';
                        touchGhost.style.transition = 'transform 0.2s';
                        document.body.appendChild(touchGhost);
                        
                        icon.style.opacity = '0.3';
                    }, 500); 
                }, {passive: true});

                icon.addEventListener('touchmove', (e) => {
                    if(!draggedEl) {
                        clearTimeout(touchTimer);
                        return;
                    }
                    e.preventDefault();
                    const touch = e.touches[0];
                    
                    if(touchGhost) {
                        const rect = icon.getBoundingClientRect();
                        touchGhost.style.left = (touch.clientX - rect.width / 2) + 'px';
                        touchGhost.style.top = (touch.clientY - rect.height / 2) + 'px';
                    }

                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    const targetIcon = target ? target.closest('.desktop-icon') : null;
                    
                    if(targetIcon && targetIcon !== draggedEl) {
                        const allIcons = [...desktopArea.querySelectorAll('.desktop-icon')];
                        const draggedIdx = allIcons.indexOf(draggedEl);
                        const targetIdx = allIcons.indexOf(targetIcon);
                        if (draggedIdx < targetIdx) targetIcon.after(draggedEl);
                        else targetIcon.before(draggedEl);
                    }
                }, {passive: false});

                const endTouch = () => {
                    clearTimeout(touchTimer);
                    if(draggedEl) {
                        draggedEl.style.opacity = '1';
                        setTimeout(() => draggedEl.dataset.isDragging = 'false', 50);
                        draggedEl = null;
                        if(touchGhost) {
                            touchGhost.remove();
                            touchGhost = null;
                        }
                        OS.saveAppOrder();
                    }
                };

                icon.addEventListener('touchend', endTouch);
                icon.addEventListener('touchcancel', endTouch);
            });
        },

        saveAppOrder() {
            const desktopArea = document.getElementById('desktop-area');
            const icons = desktopArea.querySelectorAll('.desktop-icon');
            this.state.appOrder = Array.from(icons).map(icon => icon.dataset.appId);
            localStorage.setItem('islamOS_appOrder', JSON.stringify(this.state.appOrder));
        },

        openApp(appId, isRestoring = false) {
            if (this.state.activeWindows[appId]) {
                this.restoreApp(appId);
                return;
            }

            const app = this.apps[appId];
            this.state.zIndexCounter++;

            const win = document.createElement('div');
            win.id = `window-${appId}`;
            win.className = 'os-window glass';
            
            const offset = Object.keys(this.state.activeWindows).length * 20;
            const startX = Math.max(20, (window.innerWidth / 2) - (app.width / 2) + offset);
            const startY = Math.max(40, (window.innerHeight / 2) - (app.height / 2) + offset);

            win.style.width = `${app.width}px`;
            win.style.height = `${app.height}px`;
            win.style.left = `${startX}px`;
            win.style.top = `${startY}px`;
            win.style.zIndex = this.state.zIndexCounter;

            win.innerHTML = `
                <div class="window-header" id="header-${appId}">
                    <div class="window-controls">
                        <div class="win-btn win-close" onclick="OS.closeApp('${appId}')" title="Close"></div>
                        <div class="win-btn win-min" onclick="OS.minimizeApp('${appId}')" title="Minimize"></div>
                        <div class="win-btn win-max" ondblclick="OS.maximizeApp('${appId}')" onclick="OS.maximizeApp('${appId}')" title="Maximize"></div>
                    </div>
                    <div class="window-title">
                        <i class="ph-fill ${app.icon} sm:hidden mr-1"></i> ${app.title}
                    </div>
                </div>
                <div class="window-content hide-scrollbar">${app.render()}</div>
                <div class="win-resize-handle" id="resize-${appId}"></div>
            `;

            document.getElementById('desktop-environment').appendChild(win);
            this.state.activeWindows[appId] = win;

            void win.offsetWidth; 

            requestAnimationFrame(() => {
                win.classList.add('window-open');
                this.bringToFront(appId);
            });

            this.makeDraggable(win, document.getElementById(`header-${appId}`));
            this.makeResizable(win, document.getElementById(`resize-${appId}`));
            
            win.addEventListener('mousedown', () => this.bringToFront(appId));
            win.addEventListener('touchstart', () => this.bringToFront(appId), {passive: true});
            
            document.getElementById(`header-${appId}`).addEventListener('dblclick', (e) => {
                if(!e.target.closest('.win-btn')) this.maximizeApp(appId);
            });
            
            this.updateDock();
            if(!isRestoring) this.saveSession();
            
            if(appId === 'quran') QuranEngine.onAppOpen();
            if(appId === 'adhkar') OS.apps.adhkar.updateUI();
            if(appId === 'tasks') OS.apps.tasks.updateUI();
            if(appId === 'radio') OS.apps.radio.updateUI();
            if(appId === 'quiz') OS.apps.quiz.updateUI();
        },

        closeApp(appId) {
            if(appId === 'quran') QuranEngine.pauseAudio();
            if(appId === 'asma') AsmaEngine.stopAudio();
            
            const win = this.state.activeWindows[appId];
            if (win) {
                win.classList.remove('window-open', 'active-window');
                win.classList.add('window-closing');
                setTimeout(() => {
                    win.remove();
                    delete this.state.activeWindows[appId];
                    this.updateDock();
                    this.saveSession();
                }, 300); 
            }
        },

        minimizeApp(appId) {
            const win = this.state.activeWindows[appId];
            if (win) {
                win.classList.remove('window-open', 'active-window');
                win.classList.add('window-minimizing');
                setTimeout(() => { win.style.display = 'none'; this.updateDock(); }, 400);
            }
        },

        maximizeApp(appId) {
            const win = this.state.activeWindows[appId];
            if (!win) return;
            if(window.innerWidth <= 768) return;

            if (win.dataset.maximized === "true") {
                win.style.width = win.dataset.prevWidth;
                win.style.height = win.dataset.prevHeight;
                win.style.top = win.dataset.prevTop;
                win.style.left = win.dataset.prevLeft;
                win.style.borderRadius = "14px";
                win.dataset.maximized = "false";
            } else {
                win.dataset.prevWidth = win.style.width;
                win.dataset.prevHeight = win.style.height;
                win.dataset.prevTop = win.style.top;
                win.dataset.prevLeft = win.style.left;
                
                win.style.width = "100vw";
                win.style.height = "calc(100vh - 36px)";
                win.style.top = "36px";
                win.style.left = "0px";
                win.style.borderRadius = "0px";
                win.dataset.maximized = "true";
            }
            this.bringToFront(appId);
        },

        restoreApp(appId) {
            const win = this.state.activeWindows[appId];
            if (win) {
                win.style.display = 'flex';
                void win.offsetWidth; 
                win.classList.remove('window-minimizing');
                win.classList.add('window-open');
                this.bringToFront(appId);
            } else {
                this.openApp(appId);
            }
        },

        bringToFront(appId) {
            const win = this.state.activeWindows[appId];
            if (win) {
                this.state.zIndexCounter++;
                win.style.zIndex = this.state.zIndexCounter;
                document.querySelectorAll('.os-window').forEach(w => w.classList.remove('active-window'));
                win.classList.add('active-window');
                this.updateDock();
            }
        },

        updateDock() {
            const container = document.getElementById('dock-container');
            container.innerHTML = '';
            
            Object.values(this.apps).forEach(app => {
                const appId = app.id;
                const win = this.state.activeWindows[appId];
                const isOpen = !!win;
                const isActive = isOpen && win.classList.contains('active-window') && win.style.display !== 'none';
                
                const wrapper = document.createElement('div');
                wrapper.className = 'dock-icon-wrapper';
                wrapper.title = app.title;

                const iconDiv = document.createElement('div');
                iconDiv.className = `dock-icon ${isActive ? 'bg-white/20 border-white/40 scale-110 shadow-lg' : ''}`;
                iconDiv.innerHTML = `<i class="ph-fill ${app.icon} text-[34px] md:text-[38px] ${isOpen ? 'text-emerald-400' : 'text-gray-100'}"></i>`;
                
                const indicator = document.createElement('div');
                indicator.className = `dock-indicator ${isOpen ? 'active' : ''}`;

                wrapper.appendChild(iconDiv);
                wrapper.appendChild(indicator);
                
                wrapper.onclick = () => {
                    if (!isOpen) this.openApp(appId);
                    else if (isActive) this.minimizeApp(appId);
                    else this.restoreApp(appId);
                };
                container.appendChild(wrapper);
            });
        },

        toggleStartMenu() {
            this.state.isStartMenuOpen = !this.state.isStartMenuOpen;
            const menu = document.getElementById('start-menu');
            if(this.state.isWidgetPanelOpen) this.toggleWidgetPanel();

            if (this.state.isStartMenuOpen) {
                menu.classList.remove('scale-95', 'opacity-0', 'pointer-events-none');
                menu.classList.add('scale-100', 'opacity-100', 'pointer-events-auto');
            } else {
                menu.classList.remove('scale-100', 'opacity-100', 'pointer-events-auto');
                menu.classList.add('scale-95', 'opacity-0', 'pointer-events-none');
            }
        },

        toggleWidgetPanel() {
            this.state.isWidgetPanelOpen = !this.state.isWidgetPanelOpen;
            const panel = document.getElementById('widget-panel');
            if(this.state.isStartMenuOpen) this.toggleStartMenu();
            
            if (this.state.isWidgetPanelOpen) {
                panel.classList.add('open');
                this.updateWidgets();
            } else {
                panel.classList.remove('open');
            }
        },

        updateWidgets() {
            const now = new Date();
            const hDate = new Intl.DateTimeFormat('en-US-u-ca-islamic-umalqura', { day: 'numeric', month: 'long', year: 'numeric' }).format(now);
            const gDate = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            
            const widHijriDate = document.getElementById('wid-hijri-date');
            if (widHijriDate) widHijriDate.innerText = hDate;
            const widGregDate = document.getElementById('wid-greg-date');
            if (widGregDate) widGregDate.innerText = gDate;

            const tList = document.getElementById('wid-tasks-list');
            if(tList && typeof TasksEngine !== 'undefined') {
                const pending = TasksEngine.tasks.filter(t => !t.done).slice(0, 3);
                if(pending.length > 0) {
                    tList.innerHTML = pending.map(t => `<div class="text-sm text-gray-200 flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div> ${t.text}</div>`).join('');
                } else {
                    tList.innerHTML = `<div class="text-sm text-gray-500 italic">All caught up!</div>`;
                }
            }
        },

        toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        },

        makeDraggable(element, handle) {
            let p1=0, p2=0, p3=0, p4=0;
            let reqAnimFrame = null;
            let isDragging = false;
            
            handle.onmousedown = (e) => { 
                if(e.target.closest('.win-btn')) return; 
                e.preventDefault(); 
                p3 = e.clientX; p4 = e.clientY; 
                startDrag();
                document.onmouseup = closeDrag; document.onmousemove = drag; 
            };
            handle.ontouchstart = (e) => { 
                if(e.target.closest('.win-btn')) return;
                p3 = e.touches[0].clientX; p4 = e.touches[0].clientY; 
                startDrag();
                document.ontouchend = closeDrag; document.ontouchmove = tDrag; 
            };
            
            function startDrag() {
                isDragging = true;
                element.classList.add('no-transition', 'window-moving');
            }
            
            function drag(e) { e.preventDefault(); calc(e.clientX, e.clientY); }
            function tDrag(e) { calc(e.touches[0].clientX, e.touches[0].clientY); }
            
            function calc(cx, cy) {
                if (!isDragging) return;
                p1 = p3 - cx; p2 = p4 - cy; p3 = cx; p4 = cy;
                
                // Using requestAnimationFrame dramatically improves Safari performance
                if(reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
                reqAnimFrame = requestAnimationFrame(() => {
                    let top = element.offsetTop - p2;
                    let left = element.offsetLeft - p1;
                    if(top < 36) top = 36;
                    if(top > window.innerHeight - 50) top = window.innerHeight - 50;
                    element.style.top = top + "px";
                    element.style.left = left + "px";
                });
            }
            function closeDrag() { 
                isDragging = false;
                if(reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
                element.classList.remove('no-transition', 'window-moving');
                document.onmouseup=null; document.onmousemove=null; document.ontouchend=null; document.ontouchmove=null; 
            }
        },
        
        makeResizable(element, handle) {
            let startX, startY, startWidth, startHeight;
            let reqAnimFrame = null;
            let isResizing = false;
            
            handle.onmousedown = (e) => {
                e.preventDefault(); e.stopPropagation();
                startX = e.clientX; startY = e.clientY;
                startResize();
                document.onmouseup = closeResize; document.onmousemove = resize;
            };
            handle.ontouchstart = (e) => {
                e.stopPropagation();
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                startResize();
                document.ontouchend = closeResize; document.ontouchmove = tResize;
            };
            
            function startResize() {
                isResizing = true;
                startWidth = parseInt(document.defaultView.getComputedStyle(element).width, 10);
                startHeight = parseInt(document.defaultView.getComputedStyle(element).height, 10);
                element.classList.add('no-transition', 'window-moving');
            }
            
            function resize(e) { calcResize(e.clientX, e.clientY); }
            function tResize(e) { calcResize(e.touches[0].clientX, e.touches[0].clientY); }
            
            function calcResize(cx, cy) {
                if(!isResizing) return;
                if(reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
                reqAnimFrame = requestAnimationFrame(() => {
                    element.style.width = Math.max(300, (startWidth + cx - startX)) + 'px';
                    element.style.height = Math.max(200, (startHeight + cy - startY)) + 'px';
                });
            }
            
            function closeResize() {
                isResizing = false;
                if(reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
                element.classList.remove('no-transition', 'window-moving');
                document.onmouseup=null; document.onmousemove=null; document.ontouchend=null; document.ontouchmove=null;
            }
        }
    };

    window.onload = () => OS.init();
</script>
