<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Islam OS 3.0 - Hybrid Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- PWA / Add to Home Screen Meta Tags -->
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Islam OS">
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2310b981'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle' fill='white'%3E%E2%98%AA%3C/text%3E%3C/svg%3E">

    <style>
        :root {
            --glass-bg: rgba(15, 20, 25, 0.5);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.08);
            --accent-color: #10b981; 
            --arabic-font: 'Amiri', serif;
            --glass-blur: 25px; /* Reduced from 30px for better Safari performance */
        }

        html, body { 
            height: 100%; 
            height: 100dvh; 
            width: 100%; 
            font-size: 16px; 
            margin: 0;
            overflow: hidden;
            background: #0f172a url('https://images.unsplash.com/photo-1590076215667-87ebff3b3e02?q=80&w=2500&auto=format&fit=crop') center/cover fixed; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none; 
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Lockscreen Styles */
        #lockscreen {
            position: fixed; inset: 0; z-index: 50000;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            background: transparent;
            backdrop-filter: blur(15px) brightness(0.7);
            -webkit-backdrop-filter: blur(15px) brightness(0.7);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 10vh 20px 5vh 20px;
        }
        #lockscreen.unlocked {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
        .lock-clock { font-size: clamp(4rem, 15vw, 8rem); font-weight: 700; letter-spacing: -2px; line-height: 1; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .lock-date { font-size: clamp(1rem, 3vw, 1.5rem); font-weight: 500; text-shadow: 0 4px 10px rgba(0,0,0,0.5); opacity: 0.9; margin-top: 10px; }
        
        /* Glass Panel Reusable */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        #desktop-environment {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            overflow: hidden; z-index: 10;
            transform: scale(1.05); 
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #desktop-environment.active { transform: scale(1); }

        /* macOS Menubar */
        #menubar {
            height: 36px; width: 100%; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 10000;
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(20px) saturate(200%); -webkit-backdrop-filter: blur(20px) saturate(200%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem; font-weight: 500; letter-spacing: 0.3px;
        }

        /* Widget Panel */
        #widget-panel {
            position: fixed; top: 36px; right: 0; bottom: 0; width: 350px;
            background: rgba(20, 25, 30, 0.6); backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%);
            border-left: 1px solid var(--glass-border);
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 9990; padding: 20px; overflow-y: auto;
        }
        #widget-panel.open { transform: translateX(0); }

        /* Desktop Grid */
        #desktop-area {
            flex: 1; position: relative; padding: 30px; display: flex; flex-direction: column; flex-wrap: wrap;
            align-content: flex-end; gap: 28px; margin-bottom: 90px; overflow-y: auto; overflow-x: hidden;
            z-index: 1;
        }

        #desktop-widgets { z-index: 0; }

        .desktop-icon {
            width: 90px; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; padding: 10px; border-radius: 12px; transition: all 0.2s ease;
        }
        .desktop-icon:hover { background: var(--glass-highlight); transform: scale(1.05); }
        .desktop-icon:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .desktop-icon i { font-size: 52px; margin-bottom: 8px; color: #f8fafc; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); transition: transform 0.2s; }
        .desktop-icon span { font-size: 0.85rem; text-align: center; text-shadow: 0 1px 3px rgba(0,0,0,0.9); font-weight: 500; }

        /* Windows */
        .os-window {
            position: absolute; border-radius: 14px; display: flex; flex-direction: column; overflow: hidden;
            transform: scale(0.95) translateY(20px); opacity: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s, box-shadow 0.3s;
            will-change: transform, opacity, left, top;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(25, 25, 30, 0.85);
            /* Reduced blur drastically to fix Safari performance */
            backdrop-filter: blur(20px) saturate(200%); -webkit-backdrop-filter: blur(20px) saturate(200%);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.2);
        }
        .os-window.window-open { transform: scale(1) translateY(0); opacity: 1; }
        .os-window.active-window { box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.2); z-index: 9000; }
        .os-window.window-closing { transform: scale(0.95) translateY(10px) !important; opacity: 0 !important; transition: all 0.2s ease !important; }
        .os-window.window-minimizing { transform: scale(0.6) translateY(50vh) !important; opacity: 0 !important; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important; pointer-events: none; }
        
        /* Performance boost class used when dragging */
        .window-moving { 
            backdrop-filter: none !important; -webkit-backdrop-filter: none !important; 
            background: rgba(25, 25, 30, 0.98) !important; 
            transition: none !important; 
        }
        .no-transition { transition: none !important; }

        /* Traffic Lights */
        .window-header {
            height: 46px; display: flex; align-items: center; padding: 0 16px; cursor: grab; position: relative;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .window-header:active { cursor: grabbing; }
        .window-controls { display: flex; gap: 8px; z-index: 10; position: relative; }
        .win-btn { 
            width: 13px; height: 13px; border-radius: 50%; cursor: pointer; transition: all 0.2s; 
            border: 1px solid rgba(0,0,0,0.1); position: relative; display: flex; align-items: center; justify-content: center;
        }
        .win-btn::before { opacity: 0; transition: opacity 0.2s; font-size: 10px; color: rgba(0,0,0,0.6); font-weight: bold; line-height: 1; }
        .window-controls:hover .win-btn::before { opacity: 1; }
        .win-close { background: #ff5f56; } .win-close::before { content: '×'; }
        .win-min { background: #ffbd2e; } .win-min::before { content: '−'; }
        .win-max { background: #27c93f; } .win-max::before { content: '+'; }
        
        .window-title { 
            position: absolute; left: 0; right: 0; text-align: center; font-size: 0.95rem; font-weight: 600; 
            color: rgba(255,255,255,0.85); pointer-events: none; display: flex; justify-content: center; align-items: center; gap: 8px; z-index: 0;
        }
        .win-resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; z-index: 10; }
        .window-content { flex: 1; padding: 24px; overflow-y: auto; position: relative; }

        /* macOS Floating Dock */
        #dock-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
            padding: 10px 12px; background: rgba(20, 25, 30, 0.6); backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            display: flex; gap: 10px; align-items: flex-end; transition: transform 0.3s;
        }
        .dock-icon-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .dock-icon {
            width: 58px; height: 58px; border-radius: 14px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transform-origin: bottom center;
        }
        .dock-icon-wrapper:hover .dock-icon { transform: scale(1.3) translateY(-10px); background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); z-index: 10; margin: 0 10px; }
        .dock-icon-wrapper:active .dock-icon { transform: scale(1.1) translateY(-5px); filter: brightness(0.8); }
        .dock-indicator { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.8); position: absolute; bottom: -8px; opacity: 0; transition: opacity 0.3s; }
        .dock-indicator.active { opacity: 1; }

        .arabic-text { font-family: var(--arabic-font); }
        .app-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; margin-bottom: 16px; transition: background 0.2s; }
        .app-card:hover { background: rgba(255,255,255,0.06); }
        @keyframes pulse-emerald { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* ==========================================================================
           iOS MOBILE ADAPTATION (Active below 768px)
           ========================================================================== */
        @media (max-width: 768px) {
            .lock-clock { font-size: 5rem; }
            #lockscreen { padding-top: 15vh; }

            .menubar-left .sys-logo span, .menubar-left .hidden, #menubar .ph-corners-out { display: none !important; }
            #menubar { display: none !important; } 
            
            #desktop-area {
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr)); 
                grid-auto-rows: min-content; 
                gap: 20px 2.5vw; 
                padding: 40px 4vw 130px 4vw; 
                margin-bottom: 0;
                align-content: flex-start;
                justify-content: stretch;
            }
            .desktop-icon { width: 100%; padding: 0; height: auto; justify-content: flex-start; }
            .desktop-icon i {
                width: clamp(50px, 15vw, 62px); 
                height: clamp(50px, 15vw, 62px);
                font-size: clamp(30px, 8vw, 38px);
                border-radius: 22%; 
                background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2);
                display: flex; align-items: center; justify-content: center; margin-bottom: 6px; box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            }
            .desktop-icon span { 
                font-size: clamp(0.65rem, 3vw, 0.75rem); 
                text-shadow: 0 1px 3px rgba(0,0,0,0.8); 
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; padding: 0 2px;
            }
            .desktop-icon:hover { transform: none; background: transparent; }
            .desktop-icon:active i { filter: brightness(0.7); transform: scale(0.9); }

            #desktop-widgets { display: none !important; }

            .ios-widget {
                border-radius: 24px;
                background: rgba(255,255,255,0.1);
                backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
                border: 1px solid rgba(255,255,255,0.2);
                padding: clamp(12px, 4vw, 16px); 
                box-shadow: 0 8px 20px rgba(0,0,0,0.2);
                display: flex; flex-direction: column;
                position: relative; overflow: hidden;
            }
            .widget-2x2 { grid-column: span 2; grid-row: span 2; }
            .widget-4x2 { grid-column: span 4; grid-row: span 2; }

            #dock-container {
                width: calc(100% - 6vw); bottom: 15px; padding: clamp(12px, 3vw, 16px) clamp(8px, 2vw, 12px); border-radius: 36px;
                justify-content: flex-start; background: rgba(30, 35, 40, 0.85); box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
                gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch;
            }
            #dock-container::-webkit-scrollbar { display: none; }
            .dock-icon-wrapper { flex: 0 0 auto; margin: 0 !important; }
            .dock-icon { 
                width: clamp(45px, 12vw, 50px); 
                height: clamp(45px, 12vw, 50px); 
                border-radius: 14px; background: transparent; border: none; box-shadow: none; 
            }
            .dock-icon i { font-size: clamp(28px, 8vw, 34px); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
            .dock-icon-wrapper:hover .dock-icon { transform: none; background: transparent; border-color: transparent; margin: 0; z-index: 1;}
            .dock-icon-wrapper:active .dock-icon { transform: scale(0.85); }
            .dock-indicator { display: none; }

            .os-window {
                width: 100% !important; 
                height: 100dvh !important; 
                top: 0 !important; left: 0 !important;
                border-radius: 0 !important; border: none !important; background: #000 !important; 
                transform: translateY(100%) scale(0.95) !important; opacity: 1 !important; 
                transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1) !important; 
                z-index: 20000 !important; box-sizing: border-box; display: flex !important;
                backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
            }
            .os-window.window-open { transform: translateY(0) scale(1) !important; }
            .window-content { padding: 16px !important; padding-bottom: calc(40px + env(safe-area-inset-bottom)) !important; }
            .win-resize-handle { display: none !important; }

            .window-header {
                height: 60px; padding-top: env(safe-area-inset-top, 20px); background: rgba(20,20,25,0.9);
                justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: default !important;
            }
            .window-title { font-size: 1.1rem; }
            .window-controls { position: absolute; left: 16px; right: 16px; top: 0; bottom: 0; align-items: center; padding-top: env(safe-area-inset-top, 20px); display: flex; justify-content: space-between; width: calc(100% - 32px); }
            .win-max { display: none !important; }
            
            .win-min { 
                width: auto !important; height: auto !important; border: none !important; background: transparent !important; 
                padding: 10px 15px 10px 0 !important; margin-left: -5px !important; box-shadow: none !important; display: flex !important; align-items: center !important;
                order: 1;
            }
            .win-min::before { content: '❮ Back' !important; opacity: 1 !important; color: var(--accent-color) !important; font-size: clamp(0.9rem, 3.5vw, 1.1rem) !important; font-weight: 500 !important; letter-spacing: 0px; }

            .win-close { 
                width: auto !important; height: auto !important; border: none !important; background: transparent !important; 
                padding: 10px 0 10px 15px !important; margin-right: -5px !important; box-shadow: none !important; display: flex !important; align-items: center !important;
                order: 2;
            }
            .win-close::before { content: '✕' !important; opacity: 1 !important; color: rgba(255,255,255,0.7) !important; font-size: 1.3rem !important; font-weight: 600 !important; }
        }
    </style>
</head>
<body>

<div id="bg-layer-1" class="fixed inset-0 bg-cover bg-center transition-opacity duration-[2000ms] z-0"></div>
<div id="bg-layer-2" class="fixed inset-0 bg-cover bg-center transition-opacity duration-[2000ms] opacity-0 z-0"></div>

<div id="lockscreen">
    <div class="text-center mt-12 flex flex-col items-center">
        <i class="ph-fill ph-lock-key text-2xl text-emerald-400 mb-4" id="lock-icon"></i>
        <div id="lock-time" class="lock-clock font-sans tracking-tight">00:00</div>
        <div id="lock-date" class="lock-date text-emerald-300">Loading...</div>
    </div>
    
    <div class="mb-16 flex flex-col items-center">
        <div class="flex items-center gap-2 mb-6">
            <i class="ph-fill ph-bell text-emerald-400 text-sm"></i>
            <span class="text-sm font-medium opacity-80" id="lock-next-prayer">Syncing Prayer Times...</span>
        </div>
        <button onclick="OS.unlock()" class="bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-md text-white px-8 py-3 rounded-full font-semibold text-lg transition transform hover:scale-105 shadow-xl flex items-center gap-2">
            Enter System <i class="ph-bold ph-arrow-right"></i>
        </button>
    </div>
</div>

<div id="desktop-environment">
    <div id="menubar">
        <div class="menubar-left flex items-center gap-4">
            <div class="sys-logo flex items-center cursor-pointer hover:opacity-80 transition" onclick="OS.toggleStartMenu()">
                <i class="ph-fill ph-moon-stars text-xl text-emerald-400 mr-2"></i>
                <span class="font-bold tracking-wide">Islam OS</span>
            </div>
            <div class="hidden sm:flex gap-5 text-gray-300 ml-4 font-medium">
                <span class="hover:text-white cursor-pointer transition">File</span>
                <span class="hover:text-white cursor-pointer transition">Edit</span>
                <span class="hover:text-white cursor-pointer transition">View</span>
            </div>
        </div>
        <div class="menubar-right flex items-center gap-4">
            <div id="quick-prayer-status" class="text-sm font-bold text-emerald-400 flex items-center gap-1.5 cursor-pointer hover:text-emerald-300 transition bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20" onclick="OS.openApp('prayer')">
                <i class="ph-fill ph-mosque text-base"></i> <span id="tb-prayer-text" class="hidden sm:inline">Syncing...</span>
            </div>
            <i class="ph ph-corners-out cursor-pointer hover:text-white text-gray-300 transition text-lg" onclick="FocusEngine.promptFocusMode()" title="Focus Mode / Fullscreen"></i>
            <i class="ph-bold ph-wifi-high text-gray-300 text-lg"></i>
            <div class="flex items-center gap-2 ml-2 cursor-pointer hover:text-emerald-400 transition" onclick="OS.toggleWidgetPanel()">
                <span id="sys-hijri" class="text-sm text-gray-400 hidden md:block"></span>
                <span id="sys-time" class="font-semibold text-base">00:00</span>
            </div>
        </div>
    </div>

    <div id="desktop-widgets" class="absolute top-16 left-10 w-72 flex-col gap-6 hidden md:flex pointer-events-auto">
        <div class="glass p-6 rounded-3xl border border-white/10 shadow-[0_15px_30px_rgba(0,0,0,0.4)] cursor-pointer hover:bg-white/5 transition duration-300" onclick="OS.openApp('calendar')">
            <div class="text-6xl font-bold text-white tracking-tighter mb-2" id="desk-wid-time">00:00</div>
            <div class="text-emerald-400 font-bold text-sm uppercase tracking-widest mb-1" id="desk-wid-date">Loading...</div>
            <div class="text-gray-400 text-sm font-medium" id="desk-wid-hijri">Loading...</div>
        </div>
        <div class="glass p-6 rounded-3xl border border-white/10 shadow-[0_15px_30px_rgba(0,0,0,0.4)] relative overflow-hidden group cursor-pointer hover:bg-white/5 transition duration-300" onclick="OS.openApp('prayer')">
            <div class="absolute -right-6 -top-6 text-emerald-500/10 transition transform group-hover:scale-110 duration-500"><i class="ph-fill ph-mosque text-9xl"></i></div>
            <h4 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest flex items-center gap-2"><i class="ph-fill ph-clock text-emerald-400"></i> Next Prayer</h4>
            <div class="text-3xl font-bold text-emerald-400 mb-1 tracking-tight" id="desk-wid-prayer-name">--</div>
            <div class="text-xl font-medium text-white mb-4" id="desk-wid-prayer-time">--:--</div>
            <div class="text-sm font-mono bg-black/40 inline-block px-3 py-1.5 rounded-lg text-gray-200 border border-white/5" id="desk-wid-prayer-countdown">00:00:00</div>
        </div>
    </div>

    <div id="desktop-area"></div>
    <div id="dock-container"></div>

    <div id="widget-panel" class="glass">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-white">Today</h3>
            <button onclick="OS.toggleWidgetPanel()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition"><i class="ph ph-x"></i></button>
        </div>
        
        <div class="app-card relative overflow-hidden group cursor-pointer" onclick="OS.openApp('prayer'); OS.toggleWidgetPanel();">
            <div class="absolute -right-6 -top-6 text-emerald-500/10 group-hover:text-emerald-500/20 transition"><i class="ph-fill ph-mosque text-8xl"></i></div>
            <h4 class="text-sm font-bold text-gray-400 mb-1 uppercase tracking-wider">Next Prayer</h4>
            <div class="text-3xl font-bold text-emerald-400 mb-1" id="wid-prayer-name">--</div>
            <div class="text-lg text-white mb-2" id="wid-prayer-time">--:--</div>
            <div class="text-sm text-gray-400 font-mono" id="wid-prayer-countdown">00:00:00</div>
        </div>

        <div class="app-card cursor-pointer" onclick="OS.openApp('calendar'); OS.toggleWidgetPanel();">
            <h4 class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-wider">Hijri Date</h4>
            <div class="text-xl font-bold text-white leading-tight mb-2" id="wid-hijri-date">Loading...</div>
            <div class="text-sm text-emerald-400" id="wid-greg-date">Loading...</div>
        </div>

<script>
    /* =========================================================
       SYSTEM ENGINES
       ========================================================= */

    const BackgroundEngine = {
        images: [
            "url('https://images.unsplash.com/photo-1590076215667-87ebff3b3e02?q=80&w=2500&auto=format&fit=crop')", 
            "url('https://images.unsplash.com/photo-1564770119854-5290b271dc7d?q=80&w=2500&auto=format&fit=crop')", 
            "url('https://images.unsplash.com/photo-1606761568499-6d2451b23c66?q=80&w=2500&auto=format&fit=crop')", 
            "url('https://images.unsplash.com/photo-1585036156171-384164a8c675?q=80&w=2500&auto=format&fit=crop')", 
            "url('https://images.unsplash.com/photo-1601289139585-780c10c14b22?q=80&w=2500&auto=format&fit=crop')", 
            "url('https://images.unsplash.com/photo-1519818175558-7186178a313e?q=80&w=2500&auto=format&fit=crop')", 
            "url('https://images.unsplash.com/photo-1574246604907-ea0c78a1bc7e?q=80&w=2500&auto=format&fit=crop')"  
        ],
        currentIndex: 0, interval: null, isSlideshow: false,
        init() {
            this.images.forEach(src => { const img = new Image(); img.src = src.slice(5, -2); });
        },
        start() {
            if(this.isSlideshow) return; 
            this.isSlideshow = true;
            const l1 = document.getElementById('bg-layer-1');
            const l2 = document.getElementById('bg-layer-2');
            l1.style.backgroundImage = this.images[this.currentIndex];
            l2.style.opacity = 0;
            this.interval = setInterval(() => {
                this.currentIndex = (this.currentIndex + 1) % this.images.length;
                if (l2.style.opacity === "0" || l2.style.opacity === "") {
                    l2.style.backgroundImage = this.images[this.currentIndex];
                    l2.style.opacity = 1;
                } else {
                    l1.style.backgroundImage = this.images[this.currentIndex];
                    l2.style.opacity = 0;
                }
            }, 20000); 
        },
        stop() {
            this.isSlideshow = false;
            if(this.interval) clearInterval(this.interval);
        },
        setStatic(url) {
            this.stop();
            const l1 = document.getElementById('bg-layer-1');
            const l2 = document.getElementById('bg-layer-2');
            if(l1 && l2) { l1.style.backgroundImage = url; l2.style.opacity = 0; }
        }
    };

    const MotivationEngine = {
        quotes: [
            "Allah does not burden a soul beyond that it can bear. (Quran 2:286)",
            "So verily, with the hardship, there is relief. (Quran 94:5)",
            "Do not lose hope, nor be sad. (Quran 3:139)",
            "He knows what is in every heart. (Quran 67:13)",
            "And whoever puts their trust in Allah, He will be enough for them. (Quran 65:3)",
            "Call upon Me, I will respond to you. (Quran 40:60)",
            "And He found you lost and guided you. (Quran 93:7)",
            "Indeed, Allah is with the patient. (Quran 2:153)",
            "The best among you are those who have the best manners and character. (Sahih Bukhari)",
            "Take benefit of five before five: Your youth before your old age... (Mustadrak Hakim)"
        ],
        intervalId: null,
        init() {
            this.intervalId = setInterval(() => { this.showRandom(); }, 300000);
        },
        showRandom() {
            if(OS.state.isLocked) return; 
            const quote = this.quotes[Math.floor(Math.random() * this.quotes.length)];
            OS.showNotification("Islamic Reminder", quote, "ph-sparkle");
        }
    };

    const PrayerEngine = {
        timer: null,
        init() {
            this.loadCachedData();
            this.startTicker();
            if(!OS.state.prayerData.timings || this.isCacheStale()) {
                this.requestLocation(true); 
            }
        },
        isCacheStale() { return localStorage.getItem('islamOS_prayerDate') !== new Date().toDateString(); },
        loadCachedData() {
            const cached = localStorage.getItem('islamOS_prayerTimings');
            if(cached && !this.isCacheStale()) OS.state.prayerData.timings = JSON.parse(cached);
        },
        requestLocation(silent = false, callback = null) {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        localStorage.setItem('islamOS_location', JSON.stringify({lat: pos.coords.latitude, lng: pos.coords.longitude}));
                        this.fetchTimes(pos.coords.latitude, pos.coords.longitude);
                        if(callback) callback();
                    },
                    (err) => {
                        if(!silent) OS.showNotification("Location Disabled", "Using default location (Makkah).", "ph-map-pin");
                        this.fetchTimes(21.4225, 39.8262); 
                        if(callback) callback();
                    },
                    { timeout: 10000 }
                );
            } else {
                this.fetchTimes(21.4225, 39.8262);
                if(callback) callback();
            }
        },
        async fetchTimes(lat, lng) {
            try {
                const date = new Date();
                const dStr = `${date.getDate()}-${date.getMonth()+1}-${date.getFullYear()}`;
                const method = OS.state.userProfile.prayerMethod || "2"; 
                const res = await fetch(`https://api.aladhan.com/v1/timings/${dStr}?latitude=${lat}&longitude=${lng}&method=${method}`);
                const data = await res.json();
                
                const t = data.data.timings;
                OS.state.prayerData.timings = { Fajr: t.Fajr, Dhuhr: t.Dhuhr, Asr: t.Asr, Maghrib: t.Maghrib, Isha: t.Isha };
                localStorage.setItem('islamOS_prayerTimings', JSON.stringify(OS.state.prayerData.timings));
                localStorage.setItem('islamOS_prayerDate', new Date().toDateString());
                
                this.calculateNext();
            } catch(e) { console.error("Prayer engine fetch failed"); }
        },
        startTicker() {
            this.timer = setInterval(() => { if(OS.state.prayerData.timings) this.calculateNext(); }, 1000);
        },
        calculateNext() {
            const now = new Date();
            const todayStr = now.toDateString();
            const savedDate = localStorage.getItem('islamOS_prayerDate');

            if (savedDate && savedDate !== todayStr) {
                const locStr = localStorage.getItem('islamOS_location');
                if (locStr) {
                    const loc = JSON.parse(locStr);
                    this.fetchTimes(loc.lat, loc.lng);
                } else {
                    this.fetchTimes(21.4225, 39.8262);
                }
                return;
            }

            const timings = OS.state.prayerData.timings;
            if (!timings) return;

            let nextPrayer = null;
            let minDiff = Infinity;

            const timeObjs = {};
            for (const [name, time] of Object.entries(timings)) {
                const [hours, minutes] = time.split(':');
                const pTime = new Date();
                pTime.setHours(parseInt(hours), parseInt(minutes), 0, 0);
                timeObjs[name] = pTime;
                
                const diffMs = pTime - now;
                if (diffMs > 0 && diffMs < minDiff) {
                    minDiff = diffMs;
                    nextPrayer = { name, time, dateObj: pTime };
                }
            }

            if (!nextPrayer) {
                const tomorrowFajr = new Date(timeObjs['Fajr']);
                tomorrowFajr.setDate(tomorrowFajr.getDate() + 1);
                minDiff = tomorrowFajr - now;
                nextPrayer = { name: 'Fajr', time: timings['Fajr'], dateObj: tomorrowFajr };
            }

            OS.state.prayerData.nextPrayer = nextPrayer;
            let totalSecs = Math.floor(minDiff / 1000);

            if (totalSecs === 0 && OS.state.prayerData.alertedFor !== nextPrayer.name) {
                OS.showNotification("Time for Salah", `It is now time for ${nextPrayer.name} prayer.`, "ph-mosque");
                OS.state.prayerData.alertedFor = nextPrayer.name;
            }

            const h = Math.floor(totalSecs / 3600); totalSecs %= 3600;
            const m = Math.floor(totalSecs / 60); const s = totalSecs % 60;
            const pad = (num) => String(num).padStart(2, '0');
            OS.state.prayerData.countdownStr = `${pad(h)}:${pad(m)}:${pad(s)}`;

            const tb = document.getElementById('tb-prayer-text');
            if(tb) tb.innerText = `${nextPrayer.name} in ${pad(h)}:${pad(m)}`;
            
            const lnp = document.getElementById('lock-next-prayer');
            if(lnp) lnp.innerText = `${nextPrayer.name} in ${pad(h)}:${pad(m)}`;
            
            const wn = document.getElementById('wid-prayer-name');
            if(wn) {
                wn.innerText = nextPrayer.name;
                document.getElementById('wid-prayer-time').innerText = nextPrayer.time;
                document.getElementById('wid-prayer-countdown').innerText = OS.state.prayerData.countdownStr;
            }

            const dWn = document.getElementById('desk-wid-prayer-name');
            if(dWn) {
                dWn.innerText = nextPrayer.name;
                document.getElementById('desk-wid-prayer-time').innerText = nextPrayer.time;
                document.getElementById('desk-wid-prayer-countdown').innerText = OS.state.prayerData.countdownStr;
            }
            
            const mobWn = document.getElementById('mob-wid-prayer-name');
            if(mobWn) {
                mobWn.innerText = nextPrayer.name;
                document.getElementById('mob-wid-prayer-time').innerText = nextPrayer.time;
                document.getElementById('mob-wid-prayer-countdown').innerText = OS.state.prayerData.countdownStr;
            }

            if(OS.state.activeWindows['prayer']) OS.apps.prayer.updateUI();
        }
    };

    const QuizEngine = {
        questionsBank: [
            { q: "Which Prophet constructed the Kaaba in Mecca?", options: ["Prophet Muhammad (PBUH)", "Prophet Musa (AS)", "Prophet Ibrahim (AS)", "Prophet Isa (AS)"], correctIndex: 2, explanation: "Prophet Ibrahim and his son Prophet Ismail constructed the Kaaba under Allah's command." },
            { q: "What is the longest Surah in the Holy Quran?", options: ["Surah Al-Imran", "Surah Al-Baqarah", "Surah An-Nisa", "Surah Al-Kahf"], correctIndex: 1, explanation: "Surah Al-Baqarah is the longest Surah in the Quran with 286 verses." },
            { q: "In which month was the Quran first revealed?", options: ["Muharram", "Rajab", "Ramadan", "Dhul Hijjah"], correctIndex: 2, explanation: "The Quran was first revealed during Ramadan on the 'Night of Power' (Laylat al-Qadr)." },
            { q: "Which companion was given the title 'Sword of Allah'?", options: ["Ali bin Abi Talib (RA)", "Umar bin Al-Khattab (RA)", "Hamza bin Abdul Muttalib (RA)", "Khalid bin Walid (RA)"], correctIndex: 3, explanation: "Khalid bin Walid (RA) was given the title 'Saifullah' (Sword of Allah) for his military brilliance." },
            { q: "Which angel is responsible for blowing the trumpet on the Day of Judgment?", options: ["Jibril (Gabriel)", "Mikail (Michael)", "Israfil (Raphael)", "Izrail (Azrael)"], correctIndex: 2, explanation: "Angel Israfil is tasked with blowing the trumpet (Soor) to signal the Day of Resurrection." },
            { q: "What was the first battle fought by Muslims?", options: ["Battle of Uhud", "Battle of Khandaq", "Battle of Badr", "Battle of Tabuk"], correctIndex: 2, explanation: "The Battle of Badr was the first major battle, where 313 Muslims defeated a much larger Quraysh army." },
            { q: "Which Prophet was swallowed by a whale?", options: ["Prophet Nuh (AS)", "Prophet Yunus (AS)", "Prophet Ayyub (AS)", "Prophet Sulaiman (AS)"], correctIndex: 1, explanation: "Prophet Yunus (Jonah) was swallowed by a whale after leaving his people without Allah's permission." },
            { q: "Who was the first Mu'adhin (caller to prayer) in Islam?", options: ["Abu Bakr (RA)", "Zaid bin Harithah (RA)", "Bilal ibn Rabah (RA)", "Uthman (RA)"], correctIndex: 2, explanation: "Bilal ibn Rabah (RA) was chosen by the Prophet due to his beautiful and carrying voice." },
            { q: "What is the shortest Surah in the Quran?", options: ["Al-Ikhlas", "Al-Asr", "Al-Kawthar", "An-Nas"], correctIndex: 2, explanation: "Surah Al-Kawthar is the shortest chapter, consisting of only 3 verses." },
            { q: "Which Prophet had the ability to speak to animals and control jinn?", options: ["Prophet Dawud (AS)", "Prophet Sulaiman (AS)", "Prophet Musa (AS)", "Prophet Yusuf (AS)"], correctIndex: 1, explanation: "Prophet Sulaiman (Solomon) was granted a kingdom unlike any other, with control over jinn and understanding of animal languages." }
        ],
        sessionQuestions: [],
        currentQ: 0,
        score: 0,
        answered: false,
        selectedIndex: -1,
        
        init() {
            let shuffled = [...this.questionsBank].sort(() => 0.5 - Math.random());
            this.sessionQuestions = shuffled.slice(0, 5);
            this.currentQ = 0;
            this.score = 0;
            this.answered = false;
            this.selectedIndex = -1;
            this.renderQuestion();
        },
        
        renderQuestion() {
            const container = document.getElementById('quiz-content');
            if(!container) return;
            
            const q = this.sessionQuestions[this.currentQ];
            
            let optionsHTML = '';
            q.options.forEach((opt, idx) => {
                let btnClass = "bg-white/5 hover:bg-white/10 border-white/10";
                if(this.answered) {
                    if(idx === q.correctIndex) {
                        btnClass = "bg-emerald-500/20 border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.3)] text-emerald-400";
                    } else if(idx === this.selectedIndex) {
                        btnClass = "bg-red-500/20 border-red-500 text-red-400";
                    } else {
                        btnClass = "bg-white/5 opacity-50 cursor-not-allowed";
                    }
                }
                
                optionsHTML += `
                    <button 
                        ${this.answered ? 'disabled' : `onclick="QuizEngine.selectOption(${idx})"`}
                        class="w-full text-left p-4 rounded-xl border transition-all duration-300 font-medium text-base ${btnClass}">
                        ${String.fromCharCode(65 + idx)}. ${opt}
                    </button>
                `;
            });
            
            let nextBtnHTML = '';
            if(this.answered) {
                const isLast = this.currentQ === this.sessionQuestions.length - 1;
                nextBtnHTML = `
                    <div class="mt-6 p-5 bg-gradient-to-br from-emerald-500/10 to-teal-900/40 rounded-xl border border-emerald-500/30 shadow-lg animate-[slideInRight_0.4s_ease-out]">
                        <h4 class="font-bold text-emerald-400 mb-2 uppercase tracking-widest text-xs flex items-center gap-2"><i class="ph-bold ph-info"></i> Explanation</h4>
                        <p class="text-sm text-gray-200 leading-relaxed">${q.explanation}</p>
                    </div>
                    <button onclick="QuizEngine.${isLast ? 'init()' : 'nextQuestion()'}" class="mt-6 w-full py-4 rounded-xl bg-white text-black font-bold text-base hover:bg-gray-200 transition-colors shadow-xl">
                        ${isLast ? 'Finish & Restart' : 'Next Question'}
                    </button>
                `;
            }
            
            container.innerHTML = `
                <div class="mb-2 text-xs font-bold text-gray-400 uppercase tracking-widest">Question ${this.currentQ + 1} of ${this.sessionQuestions.length}</div>
                <h3 class="text-xl md:text-2xl font-bold text-white mb-6 leading-tight">${q.q}</h3>
                <div class="space-y-3">
                    ${optionsHTML}
                </div>
                ${nextBtnHTML}
            `;
            
            const scoreEl = document.getElementById('quiz-score-display');
            if(scoreEl) scoreEl.innerText = this.score;
        },
        
        selectOption(idx) {
            if(this.answered) return;
            this.answered = true;
            this.selectedIndex = idx;
            
            if(idx === this.sessionQuestions[this.currentQ].correctIndex) {
                this.score++;
                if(navigator.vibrate) navigator.vibrate(50);
            } else {
                if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
            }
            
            this.renderQuestion();
        },
        
        nextQuestion() {
            this.currentQ++;
            this.answered = false;
            this.selectedIndex = -1;
            this.renderQuestion();
        }
    };

    const HadithEngine = {
        hadiths: [],
        current: null,
        async init() {
            if(this.hadiths.length > 0) { this.displayCurrent(); return; }
            try {
                const res = await fetch('https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/eng-nawawi.json');
                const data = await res.json();
                this.hadiths = data.hadiths;
                this.getRandom();
            } catch(e) {
                const container = document.getElementById('hadith-content');
                if(container) container.innerHTML = '<div class="text-center text-red-400 p-5 bg-red-500/10 rounded-xl">Failed to load Hadith Library.</div>';
            }
        },
        getRandom() {
            if(this.hadiths.length === 0) return;
            const idx = Math.floor(Math.random() * this.hadiths.length);
            this.current = this.hadiths[idx];
            this.displayCurrent();
        },
        displayCurrent() {
            const container = document.getElementById('hadith-content');
            if(!container || !this.current) return;
            
            const text = this.current.text.replace(/\n/g, '<br><br>');
            
            container.innerHTML = `
                <div class="app-card !p-6 space-y-4 relative overflow-hidden group">
                    <i class="ph-fill ph-quotes absolute top-4 right-4 text-7xl text-white/5 transform -scale-x-100 group-hover:scale-110 transition duration-500"></i>
                    <div class="flex justify-between items-center border-b border-white/10 pb-3 relative z-10">
                        <span class="text-sm font-bold text-emerald-400 uppercase tracking-widest flex items-center gap-2"><i class="ph-bold ph-bookmark-simple"></i> Hadith ${this.current.hadithnumber}</span>
                        <span class="text-xs font-bold text-gray-400 bg-white/10 px-2 py-1 rounded-md uppercase tracking-wider">Imam Nawawi</span>
                    </div>
                    <p class="text-base md:text-lg leading-[2] text-gray-200 font-serif relative z-10 pt-2 pb-6">
                        ${text}
                    </p>
                </div>
            `;
        }
    };

    const QuranEngine = {
        surahs: [], currentSurahData: null, audioElement: new Audio(), currentAyahIndex: -1, isPlaying: false, isBuffering: false, isNightMode: false,
        async init() {
            this.isNightMode = localStorage.getItem('islamOS_quranNight') === 'true';
            
            this.audioElement.onwaiting = () => { this.isBuffering = true; this.updatePlayBtn(); };
            this.audioElement.onplaying = () => { this.isBuffering = false; this.isPlaying = true; this.updatePlayBtn(); this.highlightAyah(this.currentAyahIndex); };
            this.audioElement.onpause = () => { this.isPlaying = false; this.isBuffering = false; this.updatePlayBtn(); };
            this.audioElement.onerror = () => { this.isPlaying = false; this.isBuffering = false; this.updatePlayBtn(); };
            this.audioElement.onended = () => { this.playNextAyah(); };

            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                this.surahs = data.data;
                if(OS.state.activeWindows['quran']) this.renderSurahList();
            } catch(e) { console.error("Quran list error"); }
        },
        renderSurahList(filter = '') {
            const list = document.getElementById('quran-surah-list');
            if(!list || this.surahs.length === 0) return;
            list.innerHTML = this.surahs
                .filter(s => s.englishName.toLowerCase().includes(filter.toLowerCase()) || s.name.includes(filter))
                .map(s => `
                    <div onclick="QuranEngine.loadSurah(${s.number})" class="p-4 bg-black/20 rounded-xl cursor-pointer hover:bg-emerald-500/30 transition flex justify-between items-center ${this.currentSurahData?.number === s.number ? 'border-l-4 border-emerald-500 bg-emerald-500/20' : 'border border-transparent'}">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-xs font-bold">${s.number}</div>
                            <span class="text-sm font-bold text-white">${s.englishName}</span>
                        </div>
                        <span class="font-serif text-lg text-emerald-300">${s.name}</span>
                    </div>
                `).join('');
        },
        filterSurahs(val) { this.renderSurahList(val); },
        showIndex() {
            const idx = document.getElementById('quran-index-panel');
            const rdr = document.getElementById('quran-reader-panel');
            if(idx && rdr) {
                idx.classList.remove('hidden', 'md:flex');
                idx.classList.add('flex');
                rdr.classList.remove('flex');
                rdr.classList.add('hidden', 'md:flex');
            }
        },
        showReader() {
            const idx = document.getElementById('quran-index-panel');
            const rdr = document.getElementById('quran-reader-panel');
            if(idx && rdr) {
                idx.classList.remove('flex');
                idx.classList.add('hidden', 'md:flex');
                rdr.classList.remove('hidden', 'md:flex');
                rdr.classList.add('flex');
            }
        },
        async loadSurah(number) {
            this.showReader();
            const loadingUI = document.getElementById('quran-loading');
            if(loadingUI) loadingUI.style.display = 'flex';
            this.pauseAudio(); 
            
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${number}/editions/ar.alafasy,en.sahih`);
                const data = await res.json();
                this.currentSurahData = data.data[0]; 
                const translationData = data.data[1]; 
                
                const titleEl = document.getElementById('quran-current-title');
                if(titleEl) titleEl.innerText = `${this.currentSurahData.englishName} - ${this.currentSurahData.name}`;
                
                const content = document.getElementById('quran-reader-content');
                if(content) {
                    content.innerHTML = this.currentSurahData.ayahs.map((ayah, i) => `
                        <div id="ayah-${i}" onclick="QuranEngine.playAyah(${i})" class="cursor-pointer transition-all duration-300 hover:bg-emerald-500/20 p-6 rounded-2xl border border-transparent mb-4 group relative overflow-hidden">

        togglePlay() {
            if(!this.currentSurahData) return;
            if(this.isPlaying || this.isBuffering) {
                this.pauseAudio();

                if (this.audioElement.src && this.audioElement.src === this.currentSurahData.ayahs[this.currentAyahIndex].audio) {
                    const playPromise = this.audioElement.play();
                    if (playPromise !== undefined) {
                        this.isBuffering = true;
                        this.updatePlayBtn();
                        playPromise.catch(e => {});
                    }
                } else {
                    this.playAyah(this.currentAyahIndex);

            this.audioElement.pause(); 
            this.isBuffering = false;
            this.isPlaying = false;

            const btn = document.getElementById('quran-play-btn');

                btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i>';
            } else {
                btn.innerHTML = this.isPlaying ? '<i class="ph-fill ph-pause text-lg"></i>' : '<i class="ph-fill ph-play text-lg ml-1"></i>';
            }

        highlightAyah(index) {
            document.querySelectorAll('[id^="ayah-"]').forEach(el => el.classList.remove('bg-emerald-500/20', 'border-emerald-500/40', 'shadow-[0_0_20px_rgba(16,185,129,0.1)]'));

            this.isNightMode = !this.isNightMode;

        applyNightMode() {
            const container = document.getElementById('quran-app-container');
            if(!container) return;
            if(this.isNightMode) container.style.filter = 'brightness(0.7) sepia(0.3) hue-rotate(-10deg)';
            else container.style.filter = 'none';

            // Dynamically update the text color classes for previously rendered ayahs
            document.querySelectorAll('[id^="ayah-"] p:first-of-type').forEach(p => {
                p.className = `text-right text-3xl md:text-5xl leading-[1.8] arabic-text dir-rtl ${this.isNightMode ? 'text-gray-400' : 'text-gray-100'} relative z-10`;

                            }, 500);
                        }
                    });
                }
            } else {
                this.showReader();
            }
        }

            this.state.station = id; this.state.hasError = false;
            this.audio.src = this.stations[id].url; 
            this.audio.load();

    const AsmaEngine = {
        names: [],
        currentIndex: -1,
        isPlayingAll: false,
        synth: window.speechSynthesis,
        
        async loadNames() {
            const list = document.getElementById('asma-list');
            try {
                let cached = JSON.parse(localStorage.getItem('islamOS_asma'));
                if(cached && Array.isArray(cached) && cached.length > 0) {
                    this.names = cached;
                    this.render();
                    return;
                }
            } catch(e) { console.error("Asma cache error", e); }
            
            try {
                const res = await fetch('https://api.aladhan.com/v1/asmaAlHusna');
                const data = await res.json();
                if(data && data.data && Array.isArray(data.data)) {
                    this.names = data.data;
                    localStorage.setItem('islamOS_asma', JSON.stringify(this.names));
                    this.render();
                }
            } catch(e) {
                if(list) list.innerHTML = '<div class="col-span-1 sm:col-span-2 text-red-400 text-center text-sm font-medium py-10 bg-red-500/10 rounded-xl">Failed to load names.</div>';
            }
        },
        render() {
            const list = document.getElementById('asma-list');
            if(!list || !Array.isArray(this.names) || this.names.length === 0) return;
            
            list.innerHTML = this.names.map((n, i) => `
                <div id="asma-card-${i}" onclick="AsmaEngine.playName(${i})" class="bg-black/30 border border-white/5 rounded-2xl p-5 text-center hover:bg-emerald-500/20 hover:border-emerald-500/30 transition duration-300 group relative cursor-pointer">
                    <div class="absolute top-3 right-3 text-emerald-400/50 group-hover:text-emerald-400 transition bg-emerald-500/10 p-2 rounded-full md:opacity-0 group-hover:opacity-100" title="Listen">
                        <i class="ph-fill ph-speaker-high text-lg"></i>
                    </div>
                    <div class="text-4xl font-serif arabic-text text-emerald-400 mb-3 leading-relaxed transform group-hover:scale-110 transition duration-300" style="text-shadow: 0 2px 10px rgba(16,185,129,0.2);">${n.name || ''}</div>
                    <div class="font-bold text-base mb-1 text-white">${n.transliteration || ''}</div>
                    <div class="text-xs font-medium text-gray-400 leading-tight">${(n.en && n.en.meaning) ? n.en.meaning : ''}</div>
                </div>
            `).join('');
        },
        playName(index) {
            if (!this.synth || !Array.isArray(this.names) || this.names.length === 0) return;
            this.synth.cancel();
            this.isPlayingAll = false;
            setTimeout(() => this.speak(index), 50);
        },
        speak(index) {
            if (!Array.isArray(this.names) || index < 0 || index >= this.names.length) return;
            
            const n = this.names[index];
            if (!n || !n.name) return; 
            
            this.currentIndex = index;
            this.highlightCard(index);
            
            const utterance = new SpeechSynthesisUtterance(n.name);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.8;
            
            utterance.onend = () => {
                this.removeHighlight(index);
                if (this.isPlayingAll && index < this.names.length - 1) {
                    this.speak(index + 1);
                } else {
                    this.isPlayingAll = false;
                    this.currentIndex = -1;
                }
            };
            
            utterance.onerror = () => {
                this.removeHighlight(index);
                this.isPlayingAll = false;
            }

            this.synth.speak(utterance);
            
            const card = document.getElementById(`asma-card-${index}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        },
        playAll() {
            if (!this.synth || !Array.isArray(this.names) || this.names.length === 0) return;
            this.synth.cancel();
            this.isPlayingAll = true;
            setTimeout(() => this.speak(0), 50);
        },
        stopAudio() {
            if (this.synth) this.synth.cancel();
            this.isPlayingAll = false;
            if (this.currentIndex !== -1) {
                this.removeHighlight(this.currentIndex);
                this.currentIndex = -1;
            }
        },
        highlightCard(index) {
            const card = document.getElementById(`asma-card-${index}`);
            if (card) {
                card.classList.add('border-emerald-500', 'bg-emerald-500/20', 'shadow-[0_0_20px_rgba(16,185,129,0.3)]');
                card.classList.remove('border-white/5', 'bg-black/30');
            }
        },
        removeHighlight(index) {
            const card = document.getElementById(`asma-card-${index}`);
            if (card) {
                card.classList.remove('border-emerald-500', 'bg-emerald-500/20', 'shadow-[0_0_20px_rgba(16,185,129,0.3)]');
                card.classList.add('border-white/5', 'bg-black/30');
            }
        }
    };

                <div class="relative w-full mb-8">
                    <input type="number" id="focus-time-input" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-4 text-center text-3xl outline-none focus:border-emerald-500 text-white font-mono shadow-inner transition" value="30" min="1" max="300">
                    <span class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 font-bold uppercase text-xs tracking-widest pointer-events-none">Mins</span>
                </div>
                <div class="flex gap-3 w-full">
                    <button onclick="FocusEngine.hide()" class="flex-1 bg-white/10 hover:bg-white/20 text-white py-3 rounded-xl font-semibold transition border border-white/5">Cancel</button>
                    <button onclick="FocusEngine.startFocusMode()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-bold transition shadow-lg">Start</button>
                </div>
            `;
        },
        startNormalFullscreen() {
            this.hide();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            }
        },
        startFocusMode() {
            const mins = parseInt(document.getElementById('focus-time-input').value) || 30;
            this.hide();
            
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            }
            
            OS.showNotification("Focus Mode Active", `Immersive mode locked for ${mins} minutes.`, "ph-brain");
            
            if (this.timer) clearTimeout(this.timer);
            
            this.timer = setTimeout(() => {
                if (document.fullscreenElement) {
                    if (document.exitFullscreen) document.exitFullscreen();
                    OS.showNotification("Focus Complete", "Alhamdulillah! Your session has ended.", "ph-check-circle");
                }
            }, mins * 60000); 
        }
    };

                    if(!loc) {
                        return `
                            <div class="flex flex-col items-center justify-center h-full text-center p-6 bg-gradient-to-b from-white/5 to-transparent rounded-xl">

                            </div>
                        `;
                    }
                    
                    const toRad = (deg) => deg * Math.PI / 180;
                    const toDeg = (rad) => rad * 180 / Math.PI;
                    const latM = toRad(21.4225);
                    const lngM = toRad(39.8262);
                    const latU = toRad(loc.lat);
                    const lngU = toRad(loc.lng);
                    const y = Math.sin(lngM - lngU);
                    const x = Math.cos(latU) * Math.tan(latM) - Math.sin(latU) * Math.cos(lngM - lngU);
                    let qibla = toDeg(Math.atan2(y, x));
                    qibla = (qibla + 360) % 360;

                    return `

                                <div class="w-6 h-6 bg-gray-800 rounded-full z-10 border-2 border-emerald-500 shadow-lg"></div>
                            </div>
                            <h2 class="text-5xl font-bold mt-10 text-white font-mono tracking-tighter">${qibla.toFixed(1)}°</h2>
                            <p class="text-xs font-bold text-emerald-400 uppercase tracking-widest mt-2 bg-emerald-500/10 px-3 py-1 rounded-full">From True North</p>
                        </div>
                    `;

        deferredPrompt: null,

        init() {
